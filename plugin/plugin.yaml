name: zalo-platform
label: Zalo (personal)
kind: platform
version: 1.1.0
description: >
  Hermes_Zalo — unofficial Zalo personal-account platform for Hermes Agent.
  Pairs with the Node bridge in this repo (zca-js): text, media, typing,
  chat-info, allowlist hot-reload. Ban risk — use a secondary Zalo account.
author: Hermes_Zalo
homepage: https://github.com/quangminh1212/Hermes_Zalo
requires_env:
  - name: ZALO_ENABLED
    description: "Enable Zalo personal adapter (requires Node bridge)"
    prompt: "Enable Zalo personal? (true/false)"
    password: false
optional_env:
  - name: ZALO_BRIDGE_PORT
    description: "Local bridge HTTP port (default 3001)"
    prompt: "Zalo bridge port"
    password: false
  - name: ZALO_ALLOWED_USERS
    description: "Comma-separated Zalo user IDs allowed (* = all)"
    prompt: "Allowed Zalo user IDs"
    password: false
  - name: ZALO_ALLOW_ALL_USERS
    description: "Allow any Zalo user (dev only)"
    prompt: "Allow all users?"
    password: false
  - name: ZALO_HOME_CHANNEL
    description: "Default chat ID for cron / notifications"
    prompt: "Home channel ID"
    password: false
  - name: ZALO_HOME_CHANNEL_NAME
    description: "Display name for home channel"
    prompt: "Home channel name"
    password: false
  - name: ZALO_FORWARD_SELF_MESSAGES
    description: "Forward messages you send from the phone (default true)"
    prompt: "Forward self messages?"
    password: false
  - name: ZALO_SEND_SEEN
    description: "Mark inbound as seen (default true)"
    prompt: "Send seen receipts?"
    password: false
  - name: ZALO_POLL_INTERVAL
    description: "Adapter poll interval seconds (default 0.4)"
    prompt: "Poll interval"
    password: false
